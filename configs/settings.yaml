# ==============================================================================
# GALAXIES: BURN RATE - MASTER SIMULATION SETTINGS
# ==============================================================================
# This file dictates the global mathematical constants, economic margins, 
# and probability curves for the entire simulation. 
# ==============================================================================

# ------------------------------------------------------------------------------
# SECTION 1: GLOBAL SETTINGS, DEFINITIONS & PLAYER STATE
# ------------------------------------------------------------------------------
player:
  starting_credits: 10000 # Amount of credits the player will start with.
  starting_ship_count: 1 # Number of ships the player will choose to start with. Uses the ship section to determine which ships can be started with.

world_settings:
  planet_generation: combined # From preset, random, combined. 
  # Preset, only planets listed in the planets section will appear.
  # Random, only random planets will be generated.
  # Combined, all preset planets will appear and then random planets will be generated.
  random_planets: 12 # Number of random planets to generate in Random/Combined planet generation rules.
  starting_planets: 3 # Number of random planets generated that will be listed as starter planets. 

definitions:
  # These tags dictate valid planet components, module capacities, commodity types, and passenger needs.
  valid_planet_tags:
    - market    # If present, the planet will have trade contracts.
    - cantina   # If present, the planet will have crew for hire.
    - terminal  # If present, the planet will have passengers contracts.
    - refuel    # If present, the planet will sell fuel.
    - shipyard  # If present, the planet will sell ships and modules.
  valid_cargo_tags:
    - hazardous 
    - fragile
    - illicit
    - perishable
  valid_passenger_tags:
    - vip
    - fugitive
    - refugee
    - military

cargo_risks:
  hazardous_chain_chance_percent: .25  # Chance that damaged hazardous cargo will chain react and destroy other cargo aboard.
  hazardous_ship_destroy_percent: 1    # Chance that damaged hazardous cargo will destroy the ship.
  illicit_discovery_chance_percent: .6 # Base chance that unprotected illicit cargo will be discovered during an inspection.
  illicit_fine_multiplier: 2.0         # Percentage of illicit cargo contract value that player will be fined in the event of confiscation.
  fragile_damage_chance_percent: .5    # Chance that unprotected fragile cargo will be damaged during transit.
  late_fee_percent_per_day: .10        # Percentage of contract value that will be reduced daily after the expiration date.

multipliers:
  crew_salary: 1.0
  contract_payout: 1.0
  fuel_cost: 1.0
  passenger_payout: 1.0
  vip_payout: 1.0
  fugitive_payout: 1.0
  vip_delay_penalty_percent: 25
  hazardous_payout: 1.7
  fragile_payout: 1.4
  illicit_payout: 1.5
  perishable_payout: 1.4

# ------------------------------------------------------------------------------
# SECTION 2: HUMAN RESOURCES & CREW MECHANICS
# ------------------------------------------------------------------------------
# Defines the core progression, state tracking, and biological hazards 
# for hired personnel. Modifiers align with d20 check systems.
# ------------------------------------------------------------------------------
crew:
  pay_period_days: 7
  skill_min: 1
  skill_max: 10
  skill_weights: [100, 90, 80, 50, 30, 20, 10, 5, 2, 1]
  skill_bonuses: [-2, -1, 0, +1, +2, +3, +4, +5, +6, +8]
  
  # Designates the UI/Flavor text for each tier of the 1-10 skill range
  skill_names: 
    - "Rookie"
    - "Novice"
    - "Apprentice"
    - "Capable"
    - "Competent"
    - "Experienced"
    - "Expert"
    - "Master"
    - "Elite"
    - "Legend"
  
  morale_min: 1
  morale_max: 10
  morale_skill_modifiers: [-2, -2, -1, -1, 0, 0, +1, +1, +2, +2]
  starting_morale_weights: [5, 8, 12, 20, 15, 15, 20, 8, 5, 2]
  morale_raise_chance: [80, 70, 60, 50, 40, 30, 35, 40, 50, 60]
  morale_raise_percent: [40, 35, 30, 25, 15, 25, 35, 40, 45, 50]
  morale_abandon_chance: [60, 40, 30, 25, 12, 8, 4, 3, 2, 0]
  
  # Designates the UI/Flavor text for each tier of the 1-10 morale range
  morale_names: 
    - "Mutinous"
    - "Hostile"
    - "Resentful"
    - "Disgruntled"
    - "Indifferent"
    - "Content"
    - "Satisfied"
    - "Motivated"
    - "Dedicated"
    - "Fanatical"

illnesses: 
  warp_sickness:
    name: "Warp-Sickness"
    contraction_chance_percent: 2
    min_days: 3
    max_days: 7
    base_dc: 8
    
  spontaneous_bioluminescence:
    name: "Spontaneous Bioluminescence"
    contraction_chance_percent: 1
    min_days: 5
    max_days: 10
    base_dc: 9
    
  tachyon_fever:
    name: "Tachyon Fever"
    contraction_chance_percent: 2
    min_days: 4
    max_days: 8
    base_dc: 10
    
  nebula_mumps:
    name: "Nebula Mumps"
    contraction_chance_percent: 3
    min_days: 3
    max_days: 6
    base_dc: 11
    
  asteroid_pox:
    name: "Asteroid Pox"
    contraction_chance_percent: 2
    min_days: 4
    max_days: 9
    base_dc: 13
    
