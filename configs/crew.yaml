roles:
  pilot:
    id: pilot
    name: Pilot
    description: Operates the helm. Checks are used to evade hazards, pirates, and navigate treacherous asteroid fields.
    base_salary: 50
  navigator:
    id: navigator
    name: Navigator
    description: Plots astrogation vectors. Checks prevent the vessel from becoming lost in transit or miscalculating fuel burns.
    base_salary: 60
  engineer:
    id: engineer
    name: Engineer
    description: Maintains the reactor and drives. Checks repair mid-flight module failures, catastrophic leaks, and life-support drops.
    base_salary: 55
  cargohand:
    id: cargohand
    name: Cargo Hand
    description: Manages the hold. Checks secure loose freight during turbulence and prevent cargo damage or theft.
    base_salary: 20
  medic:
    id: medic
    name: Medic
    description: Tends to biological needs. Checks cure random space illnesses like Rigellian Fever or Zero-G Vertigo.
    base_salary: 40
  steward:
    id: steward
    name: Steward
    description: Manages passengers. Checks de-escalate cabin disputes and prevent stowaways or fare evaders.
    base_salary: 25

origins:
  core_worlder:
    id: core_worlder
    name: Core-Worlder
    description: Educated and reliable. Standard salary and hiring expectations.
    salary_modifier: 1.0
    hire_multiplier: 5.0
    force_max_skill: false
    immune_to_sickness: false
  fringe_drifter:
    id: fringe_drifter
    name: Fringe Drifter
    description: Rough around the edges. Cheaper to hire and maintain, but highly variable.
    salary_modifier: 0.75
    hire_multiplier: 3.0
    force_max_skill: false
    immune_to_sickness: false
  android:
    id: android
    name: Synthetik-V Unit
    description: A masterwork of artificial intelligence. Flawless execution, immune to disease, and requires no salary. Astronomically expensive to purchase.
    salary_modifier: 0.0
    hire_multiplier: 500.0
    force_max_skill: true
    immune_to_sickness: true

specialties:
  none:
