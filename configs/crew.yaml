    name: Standard Training
    secondary_role: ""
    shipyard_discount: 0.0
  helm_certified:
    id: helm_certified
    name: Dual-Cert (Helm/Nav)
    secondary_role: "navigator"
    shipyard_discount: 0.0
  deck_certified:
    id: deck_certified
    name: Dual-Cert (Cargo/Steward)
    secondary_role: "steward"
    shipyard_discount: 0.0
  scrapper:
    id: scrapper
    name: Scrapper
    secondary_role: ""
    shipyard_discount: 0.15

