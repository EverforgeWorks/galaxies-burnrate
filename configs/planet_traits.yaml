# ==============================================================================
# PLANETARY TRAITS
# ==============================================================================
# Defines the economic, social, and political variables that dictate planetary 
# generation, pricing, and risk.
# ==============================================================================

economic_statuses:
  destitute:
    id: destitute
    name: Destitute
    export_contract_multiplier: 0.5
    import_contract_multiplier: 1.5
    export_passenger_multiplier: 0.5
    import_passenger_multiplier: 1.5
    fuel_cost_multiplier: 2.0
    shipyard_cost_multiplier: 1.5
    repair_cost_multiplier: 2.0
  struggling:
    id: struggling
    name: Struggling
    export_contract_multiplier: 0.8
    import_contract_multiplier: 1.2
    export_passenger_multiplier: 0.8
    import_passenger_multiplier: 1.2
    fuel_cost_multiplier: 1.25
    shipyard_cost_multiplier: 1.1
    repair_cost_multiplier: 1.25
  balanced:
    id: balanced
    name: Balanced
    export_contract_multiplier: 1.0
    import_contract_multiplier: 1.0
    export_passenger_multiplier: 1.0
    import_passenger_multiplier: 1.0
    fuel_cost_multiplier: 1.0
    shipyard_cost_multiplier: 1.0
    repair_cost_multiplier: 1.0
  booming:
    id: booming
    name: Booming
    export_contract_multiplier: 1.5
    import_contract_multiplier: 0.8
    export_passenger_multiplier: 1.5
    import_passenger_multiplier: 0.8
    fuel_cost_multiplier: 0.8
    shipyard_cost_multiplier: 0.9
    repair_cost_multiplier: 0.8
  prosperous:
    id: prosperous
    name: Prosperous
    export_contract_multiplier: 2.0
    import_contract_multiplier: 0.5
