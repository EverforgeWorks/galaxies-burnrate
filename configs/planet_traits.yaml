    name: Isolationist
    contract_volume_multiplier: 0.5
    passenger_export_volume_multiplier: 0.1
    passenger_import_volume_multiplier: 0.1
  oppressive:
    id: oppressive
    name: Oppressive
    contract_volume_multiplier: 0.8
    passenger_export_volume_multiplier: 2.5
    passenger_import_volume_multiplier: 0.2
  conventional:
    id: conventional
    name: Conventional
    contract_volume_multiplier: 1.0
    passenger_export_volume_multiplier: 1.0
    passenger_import_volume_multiplier: 1.0
  cosmopolitan:
    id: cosmopolitan
    name: Cosmopolitan
    contract_volume_multiplier: 1.5
